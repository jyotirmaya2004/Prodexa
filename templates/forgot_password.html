{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border mt-10">
    <h2 class="text-2xl font-bold mb-3 text-center text-gray-800">Forgot Password</h2>
    <p class="text-sm text-gray-600 text-center mb-6">Enter your registered email and complete the CAPTCHA to receive a verification code.</p>
    <form action="/forgot-password" method="POST" class="flex flex-col gap-4">
        <input type="hidden" name="form_token" value="{{ forgot_form_token }}">
        <div class="visually-hidden" aria-hidden="true">
            <label>Leave this field empty</label>
            <input type="text" name="website" tabindex="-1" autocomplete="off">
        </div>
        <div>
            <label for="forgot-email" class="block text-gray-700 text-sm font-bold mb-2">Email</label>
            <input id="forgot-email" type="email" name="email" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label for="forgot-captcha" class="block text-gray-700 text-sm font-bold mb-2">CAPTCHA: {{ captcha_prompt }} = ?</label>
            <input id="forgot-captcha" type="text" name="captcha" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter the answer">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition mt-2">Send Verification Code</button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-600">Remembered your password? <a href="/login" class="text-blue-500 hover:underline">Log in</a></p>
</div>
{% endblock %}
