{% extends "base.html" %}
{% block content %}
<div class="w-full max-w-sm mx-auto glass-panel rounded-2xl shadow-2xl border border-white/50 p-6 mt-4 md:mt-10 reveal" data-tilt>
    <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-amber-50 text-amber-600 mb-3 shadow-sm border border-amber-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Forgot Password</h2>
        <p class="text-sm text-slate-500 mt-1">Enter your registered email to receive a secure verification code.</p>
    </div>

    <form action="/forgot-password" method="POST" class="flex flex-col gap-4">
        <input type="hidden" name="form_token" value="{{ forgot_form_token }}">
        <div class="visually-hidden" aria-hidden="true">
            <label>Leave this field empty</label>
            <input type="text" name="website" tabindex="-1" autocomplete="off">
        </div>
        <div>
            <label for="forgot-email" class="block text-slate-700 text-sm font-semibold mb-1.5">Email Address</label>
            <input id="forgot-email" type="email" name="email" value="{{ email }}" required class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none" placeholder="alex@example.com">
        </div>
        <div>
            <label for="forgot-captcha" class="block text-slate-700 text-sm font-semibold mb-1.5">Security Check</label>
            <div class="p-1.5 bg-slate-50 border border-slate-200 rounded-lg mb-2 flex justify-center items-center shadow-inner">
                <img src="{{ captcha_prompt }}" alt="CAPTCHA Image" class="captcha-img cursor-pointer rounded border border-slate-200/50 hover:opacity-80 transition-opacity" title="Click to refresh">
            </div>
            <input id="forgot-captcha" type="text" name="captcha" required class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none" placeholder="Enter the characters above">
        </div>
        <button type="submit" class="w-full bg-slate-900 text-white font-bold py-2.5 rounded-lg hover:bg-slate-800 focus:ring-4 focus:ring-slate-900/20 transition-all duration-200 mt-1 shadow-md shadow-slate-900/20">Send Verification Code</button>
    </form>

    <div class="mt-6 pt-4 border-t border-slate-100 text-center text-sm text-slate-600">
        Remembered your password? <a href="/login" class="text-blue-600 hover:text-blue-700 font-semibold transition-colors">Log in</a>
    </div>
</div>
{% endblock %}
