{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto mt-24 text-center">
    <h1 class="text-5xl font-extrabold mb-4 text-gray-900">Find the Best Products</h1>
    <p class="text-gray-500 mb-8">Compare across major marketplaces in one click.</p>

    <form action="/search" method="POST" class="flex flex-col gap-4">
        <input type="text" name="product" placeholder="Enter product name (e.g., iPhone 15)" required class="p-4 border rounded-lg w-full text-lg shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
        <button type="submit" class="bg-blue-600 text-white font-bold py-4 px-6 rounded-lg hover:bg-blue-700 transition shadow-lg">Search Markets</button>
    </form>
</div>
{% endblock %}
