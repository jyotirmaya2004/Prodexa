{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border mt-10">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Login to Prodexa</h2>
    <form action="/login" method="POST" class="flex flex-col gap-4" autocomplete="off">
        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
            <input type="text" name="username" required autocomplete="off" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
            <input type="password" name="password" required autocomplete="new-password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition mt-2">Log In</button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-600"><a href="/forgot-password" class="text-blue-500 hover:underline">Forgot password?</a></p>
    <p class="mt-4 text-center text-sm text-gray-600">Don't have an account? <a href="/register" class="text-blue-500 hover:underline">Sign up</a></p>
</div>
{% endblock %}
