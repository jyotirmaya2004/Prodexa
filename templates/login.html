{% extends "base.html" %}
{% block content %}
<div class="auth-card mx-auto bg-white rounded-xl shadow-sm border mt-4 md:mt-6">
    <div class="text-center mb-4 md:mb-5">
        <h2 class="auth-title text-2xl font-bold text-gray-800">Log in to Prodexa</h2>
        <p class="auth-copy text-sm text-gray-600 mt-2">Continue to your saved products, search history, and personalized recommendations.</p>
    </div>

    <form action="/login" method="POST" class="flex flex-col gap-3" autocomplete="off">
        <div>
            <label class="block text-gray-700 text-sm font-bold mb-1.5">Username</label>
            <input
                type="text"
                name="username"
                required
                autocomplete="off"
                placeholder="Enter your username"
                class="auth-input w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label class="block text-gray-700 text-sm font-bold mb-1.5">Password</label>
            <input
                type="password"
                name="password"
                required
                autocomplete="new-password"
                placeholder="Enter your password"
                class="auth-input w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label for="login-captcha" class="block text-gray-700 text-sm font-bold mb-1.5">Security Check</label>
            <img src="{{ captcha_prompt }}" alt="CAPTCHA Image" class="captcha-img auth-captcha cursor-pointer mb-2 rounded border select-none" title="Click to refresh">
            <input
                id="login-captcha"
                type="text"
                name="captcha"
                required
                autocomplete="off"
                placeholder="Enter the characters above"
                class="auth-input w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2.5 rounded-lg hover:bg-blue-700 transition mt-1.5 login-cta">Log In</button>
    </form>

    <div class="mt-3 flex flex-col sm:flex-row items-center justify-between gap-2 text-sm text-gray-600">
        <a href="/forgot-password" class="text-blue-500 hover:underline">Forgot password?</a>
        <p class="m-0">New here? <a href="/register" class="text-blue-500 hover:underline">Create account</a></p>
    </div>
</div>
{% endblock %}
