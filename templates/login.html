{% extends "base.html" %}
{% block content %}
<div class="w-full max-w-sm mx-auto glass-panel rounded-2xl shadow-2xl border border-white/50 p-6 mt-4 md:mt-10 reveal" data-tilt>
    <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-50 text-blue-600 mb-3 shadow-sm border border-blue-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Welcome Back</h2>
        <p class="text-sm text-slate-500 mt-1">Log in to continue to your dashboard.</p>
    </div>

    <form action="/login" method="POST" class="flex flex-col gap-4" autocomplete="off">
        <div>
            <label for="login-username" class="block text-slate-700 text-sm font-semibold mb-1.5">Username</label>
            <input id="login-username" type="text" name="username" value="{{ username }}" required autocomplete="off" placeholder="e.g. alex_smith" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none">
        </div>
        <div>
            <label for="login-password" class="block text-slate-700 text-sm font-semibold mb-1.5">Password</label>
            <input id="login-password" type="password" name="password" required autocomplete="new-password" placeholder="••••••••" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none">
        </div>
        <div>
            <label for="login-captcha" class="block text-slate-700 text-sm font-semibold mb-1.5">Security Check</label>
            <div class="p-1.5 bg-slate-50 border border-slate-200 rounded-lg mb-2 flex justify-center items-center shadow-inner">
                <img src="{{ captcha_prompt }}" alt="CAPTCHA Image" class="captcha-img cursor-pointer rounded border border-slate-200/50 hover:opacity-80 transition-opacity" title="Click to refresh">
            </div>
            <input id="login-captcha" type="text" name="captcha" required autocomplete="off" placeholder="Enter the characters above" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none">
        </div>
        <button type="submit" class="w-full bg-slate-900 text-white font-bold py-2.5 rounded-lg hover:bg-slate-800 focus:ring-4 focus:ring-slate-900/20 transition-all duration-200 mt-1 shadow-md shadow-slate-900/20">Log In</button>
    </form>

    <div class="mt-6 pt-4 border-t border-slate-100 flex flex-col items-center justify-center gap-2 text-sm text-slate-600">
        <a href="/forgot-password" class="text-blue-600 hover:text-blue-700 font-semibold transition-colors">Forgot your password?</a>
        <p class="m-0">New here? <a href="/register" class="text-blue-600 hover:text-blue-700 font-semibold transition-colors">Create account</a></p>
    </div>
</div>
{% endblock %}
