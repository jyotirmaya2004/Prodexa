{% extends "base.html" %}
{% block content %}
<div class="auth-card mx-auto bg-white rounded-xl shadow-sm border mt-4 md:mt-6">
    <h2 class="auth-title text-2xl font-bold mb-4 text-center text-gray-800">Create an Account</h2>
    <form action="/register" method="POST" class="flex flex-col gap-3" autocomplete="off">
        <input type="hidden" name="form_token" value="{{ register_form_token }}">
        <div class="visually-hidden" aria-hidden="true">
            <label>Leave this field empty</label>
            <input type="text" name="website" tabindex="-1" autocomplete="off">
        </div>
        <div>
            <label for="register-username" class="block text-gray-700 text-sm font-bold mb-1.5">Username</label>
            <input id="register-username" type="text" name="username" required autocomplete="off" class="auth-input w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label for="register-email" class="block text-gray-700 text-sm font-bold mb-1.5">Email</label>
            <input id="register-email" type="email" name="email" required autocomplete="off" class="auth-input w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label for="register-password" class="block text-gray-700 text-sm font-bold mb-1.5">Password</label>
            <input id="register-password" type="password" name="password" required minlength="4" autocomplete="new-password" class="auth-input w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label for="register-captcha" class="block text-gray-700 text-sm font-bold mb-1.5">Security Check</label>
            <img src="{{ captcha_prompt }}" alt="CAPTCHA Image" class="captcha-img auth-captcha cursor-pointer mb-2 rounded border select-none" title="Click to refresh">
            <input id="register-captcha" type="text" name="captcha" required autocomplete="off" placeholder="Enter the characters above" class="auth-input w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2.5 rounded-lg hover:bg-blue-700 transition mt-1.5">Sign Up</button>
    </form>
    <p class="mt-3 text-center text-sm text-gray-600">Already have an account? <a href="/login" class="text-blue-500 hover:underline">Log in</a></p>
</div>
{% endblock %}
