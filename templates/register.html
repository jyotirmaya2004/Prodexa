{% extends "base.html" %}
{% block content %}
<div class="w-full max-w-sm mx-auto glass-panel rounded-2xl shadow-2xl border border-white/50 p-6 mt-4 md:mt-6 reveal" data-tilt>
    <div class="text-center mb-5">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-50 text-blue-600 mb-3 shadow-sm border border-blue-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Create Account</h2>
        <p class="text-sm text-slate-500 mt-1">Join Prodexa to curate your smarter choices.</p>
    </div>

    <form action="/register" method="POST" class="flex flex-col gap-3.5" autocomplete="off">
        <input type="hidden" name="form_token" value="{{ register_form_token }}">
        <div class="visually-hidden" aria-hidden="true">
            <label>Leave this field empty</label>
            <input type="text" name="website" tabindex="-1" autocomplete="off">
        </div>
        <div>
            <label for="register-username" class="block text-slate-700 text-sm font-semibold mb-1">Username</label>
            <input id="register-username" type="text" name="username" value="{{ username }}" required autocomplete="off" placeholder="e.g. alex_smith" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none">
        </div>
        <div>
            <label for="register-email" class="block text-slate-700 text-sm font-semibold mb-1">Email</label>
            <input id="register-email" type="email" name="email" value="{{ email }}" required autocomplete="off" placeholder="alex@example.com" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none">
        </div>
        <div>
            <label for="register-password" class="block text-slate-700 text-sm font-semibold mb-1">Password</label>
            <input id="register-password" type="password" name="password" required minlength="4" autocomplete="new-password" placeholder="••••••••" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none">
            <p class="text-[11px] text-slate-500 mt-1 font-medium leading-tight">Must be 8+ chars with upper, lower, number & symbol.</p>
        </div>
        <div>
            <label for="register-captcha" class="block text-slate-700 text-sm font-semibold mb-1">Security Check</label>
            <div class="p-1.5 bg-slate-50 border border-slate-200 rounded-lg mb-2 flex justify-center items-center shadow-inner">
                <img src="{{ captcha_prompt }}" alt="CAPTCHA Image" class="captcha-img cursor-pointer rounded border border-slate-200/50 hover:opacity-80 transition-opacity" title="Click to refresh">
            </div>
            <input id="register-captcha" type="text" name="captcha" required autocomplete="off" placeholder="Enter the characters above" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2.5 rounded-lg hover:bg-blue-700 focus:ring-4 focus:ring-blue-500/30 transition-all duration-200 mt-1 shadow-md shadow-blue-500/30">Sign Up</button>
    </form>

    <div class="mt-5 pt-4 border-t border-slate-100 text-center text-sm text-slate-600">
        Already have an account? <a href="/login" class="text-blue-600 hover:text-blue-700 font-semibold transition-colors">Log in</a>
    </div>
</div>
{% endblock %}
