{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border mt-10">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Create an Account</h2>
    <form action="/register" method="POST" class="flex flex-col gap-4" autocomplete="off">
        <input type="hidden" name="form_token" value="{{ register_form_token }}">
        <div class="visually-hidden" aria-hidden="true">
            <label>Leave this field empty</label>
            <input type="text" name="website" tabindex="-1" autocomplete="off">
        </div>
        <div>
            <label for="register-username" class="block text-gray-700 text-sm font-bold mb-2">Username</label>
            <input id="register-username" type="text" name="username" required autocomplete="off" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label for="register-email" class="block text-gray-700 text-sm font-bold mb-2">Email</label>
            <input id="register-email" type="email" name="email" required autocomplete="off" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label for="register-password" class="block text-gray-700 text-sm font-bold mb-2">Password</label>
            <input id="register-password" type="password" name="password" required minlength="4" autocomplete="new-password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition mt-2">Sign Up</button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-600">Already have an account? <a href="/login" class="text-blue-500 hover:underline">Log in</a></p>
</div>
{% endblock %}
