{% extends "base.html" %}
{% block content %}
<div class="w-full max-w-sm mx-auto glass-panel rounded-2xl shadow-2xl border border-white/50 p-6 mt-4 md:mt-10 reveal" data-tilt>
    <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 mb-3 shadow-sm border border-emerald-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Reset Password</h2>
        <p class="text-sm text-slate-500 mt-1">Enter the 6-digit code from your email and set a new password.</p>
    </div>

    <form action="/reset-password" method="POST" class="flex flex-col gap-4">
        <div>
            <label class="block text-slate-700 text-sm font-semibold mb-1.5">Email Address</label>
            <input type="email" name="email" value="{{ preset_email }}" required class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none" placeholder="alex@example.com">
        </div>
        <div>
            <label class="block text-slate-700 text-sm font-semibold mb-1.5">Verification Code</label>
            <input type="text" name="verification_code" value="{{ verification_code }}" maxlength="6" required class="w-full px-3 py-2 text-center text-xl tracking-[0.2em] font-mono bg-slate-50 border border-slate-200 rounded-lg text-slate-900 placeholder-slate-300 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none" placeholder="------">
        </div>
        <div>
            <label class="block text-slate-700 text-sm font-semibold mb-1.5">New Password</label>
            <input type="password" name="password" required class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none" placeholder="••••••••">
            <p class="text-[11px] text-slate-500 mt-1 font-medium leading-tight">Must be 8+ chars with upper, lower, number & symbol.</p>
        </div>
        <button type="submit" class="w-full bg-slate-900 text-white font-bold py-2.5 rounded-lg hover:bg-slate-800 focus:ring-4 focus:ring-slate-900/20 transition-all duration-200 mt-1 shadow-md shadow-slate-900/20">Update Password</button>
    </form>

    <div class="mt-6 pt-4 border-t border-slate-100 text-center text-sm text-slate-600">
        Need another code? <a href="/forgot-password" class="text-blue-600 hover:text-blue-700 font-semibold transition-colors">Request again</a>
    </div>
</div>
{% endblock %}
