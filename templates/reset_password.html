{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border mt-10">
    <h2 class="text-2xl font-bold mb-3 text-center text-gray-800">Reset Password</h2>
    <p class="text-sm text-gray-600 text-center mb-6">Enter the 6-digit verification code from your email and choose a new password.</p>
    <form action="/reset-password" method="POST" class="flex flex-col gap-4">
        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
            <input type="email" name="email" value="{{ preset_email }}" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">Verification Code</label>
            <input type="text" name="verification_code" maxlength="6" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="6-digit code">
        </div>
        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">New Password</label>
            <input type="password" name="password" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition mt-2">Update Password</button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-600">Need another code? <a href="/forgot-password" class="text-blue-500 hover:underline">Request again</a></p>
</div>
{% endblock %}
