{% extends "base.html" %}
{% block content %}
<h2 class="text-3xl font-bold mb-6">Saved Products</h2>

<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    {% for product in products %}
    <div class="product-card bg-white rounded-lg shadow-sm border border-gray-100 hover:bg-slate-50 transition-colors duration-300 p-5 flex flex-col" data-tilt>
        <img src="{{ product.image }}" alt="{{ product.product_name }}" class="h-40 w-full object-contain mb-4 bg-gray-50 rounded">
        <h3 class="font-bold text-gray-900 mb-1 leading-tight line-clamp-2" title="{{ product.product_name }}">{{ product.product_name }}</h3>
        <p class="text-xs text-gray-400 mb-3 uppercase tracking-wide">Source: <span class="font-semibold text-gray-600">{{ product.source }}</span></p>
        <p class="text-2xl font-bold text-gray-800 mb-5">₹{{ product.price }}</p>

        <div class="mt-auto flex flex-col gap-2">
            <a href="/product/{{ product.id }}" class="text-center border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-2 px-4 rounded transition text-sm">View Details</a>
            <button class="remove-btn bg-red-50 hover:bg-red-100 text-red-600 font-semibold py-2 px-4 rounded transition text-sm" data-id="{{ product.id }}">
                Remove
            </button>
        </div>
    </div>
    {% else %}
    <p class="text-gray-500 col-span-full text-center py-10">No saved products yet. Go <a href="/" class="text-blue-500 hover:underline font-semibold">search</a> to add some!</p>
    {% endfor %}
</div>
{% endblock %}
